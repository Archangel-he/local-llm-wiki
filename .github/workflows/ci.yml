name: CI

on:
  push:
    branches: [main, "MVP-*"]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "22"

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: wiki
          POSTGRES_PASSWORD: wiki
          POSTGRES_DB: wiki
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wiki"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: ./backend
        run: |
          pip install --upgrade pip
          pip install -r dev-requirements.txt

      - name: Run database migrations
        working-directory: ./backend
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql+psycopg://wiki:wiki@localhost:5432/wiki
          REDIS_URL: redis://localhost:6379/0

      - name: Seed database
        working-directory: ./backend
        run: python -m app.seed
        env:
          DATABASE_URL: postgresql+psycopg://wiki:wiki@localhost:5432/wiki
          REDIS_URL: redis://localhost:6379/0

      - name: Verify health endpoint
        working-directory: ./backend
        run: |
          python -c "
          import json
          from app.main import app
          from fastapi.testclient import TestClient
          response = TestClient(app).get('/api/health')
          data = response.json()
          assert data['status'] in ('ok', 'degraded'), data
          assert {'api', 'postgres', 'redis', 'worker', 'storage', 'llm'} <= data['components'].keys()
          print(json.dumps(data, indent=2))
          "
        env:
          DATABASE_URL: postgresql+psycopg://wiki:wiki@localhost:5432/wiki
          REDIS_URL: redis://localhost:6379/0

  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: ./frontend
        run: pnpm lint

      - name: Unit and component tests
        working-directory: ./frontend
        run: pnpm test

      - name: Build
        working-directory: ./frontend
        run: pnpm build

      - name: Install Playwright
        working-directory: ./frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: End-to-end tests
        working-directory: ./frontend
        run: pnpm test:e2e

  compose-build:
    runs-on: ubuntu-latest
    needs: [backend-checks, frontend-checks]
    steps:
      - uses: actions/checkout@v4
      - name: Start Compose stack
        run: |
          cp .env.example .env
          docker compose config --quiet
          docker compose up --build --detach --wait

      - name: Verify Compose stack
        run: make verify-services

      - name: Show Compose logs
        if: always()
        run: docker compose logs

      - name: Stop Compose stack
        if: always()
        run: docker compose down --volumes
