services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wiki
      POSTGRES_PASSWORD: wiki
      POSTGRES_DB: wiki
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wiki"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://wiki:wiki@postgres:5432/wiki
      REDIS_URL: redis://redis:6379/0
      LLM_BASE_URL: http://host.docker.internal:11434
    env_file:
      - .env
    volumes:
      - storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: ./worker/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://wiki:wiki@postgres:5432/wiki
      REDIS_URL: redis://redis:6379/0
      RQ_QUEUE_NAME: default
      LLM_BASE_URL: http://host.docker.internal:11434
    env_file:
      - .env
    volumes:
      - storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - api

volumes:
  pgdata:
  storage:
